<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Ritmo - Prof. Matías Poblete</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --bg-color: #fff9c4; 
            --surface: #ffffff;
            --text-main: #2c3e50;
            --btn-lvl1: #43B047; 
            --btn-lvl2: #FBD000; 
            --btn-lvl3: #E52521; 
            --accent: #049CD8;   
            --border-radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff176 15%, transparent 15%);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 0px #fbc02d, 0 25px 40px rgba(0,0,0,0.1);
            border: 5px solid #fff;
            border-bottom: 12px solid #ffb300;
            border-bottom-right-radius: 60px;
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        h1.mario-title { 
            font-family: 'Fredoka', sans-serif; 
            font-size: 4rem; 
            margin-bottom: 1rem; 
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0px 6px 0 #000;
        }
        .m-red { color: #E52521; } .m-blue { color: #049CD8; } .m-yellow { color: #FBD000; } .m-green { color: #43B047; }

        /* --- GLOSARIO --- */
        .instructions-panel {
            background: #f4faff;
            border: 4px solid var(--accent);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .instruction-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 10px;
            width: 140px;
            box-shadow: 0 4px 0 #e0e0e0;
        }

        /* Representación visual de las notas en el glosario */
        .note-visual {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .cuartina-img { font-size: 2.5rem; letter-spacing: -8px; margin-left: -10px; }

        #game-content { display: none; }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .diff-btn {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            border: 3px solid #000;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #000;
            position: relative;
            text-shadow: 1px 1px 0 #000;
        }
        .btn-l1 { background-color: var(--btn-lvl1); }
        .btn-l2 { background-color: var(--btn-lvl2); color: #000; text-shadow: none; }
        .btn-l3 { background-color: var(--btn-lvl3); }
        .diff-btn.active { top: 6px; box-shadow: 0 0px 0px #000; }

        #score-container {
            width: 100%;
            background: #fff;
            padding: 20px;
            margin: 1rem 0;
            border: 6px solid #000;
            border-radius: var(--border-radius);
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }

        .btn-main {
            border: 3px solid #000;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            color: white;
            box-shadow: 0 8px 0px #000;
            position: relative;
        }
        .btn-refresh { background-color: var(--accent); }
        .btn-play { background-color: var(--btn-lvl1); }

        .credito-profesor { margin-top: 2rem; font-weight: 800; color: #546e7a; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="mario-title">
        <span class="m-red">S</span><span class="m-blue">U</span><span class="m-yellow">P</span><span class="m-green">E</span><span class="m-red">R</span><br>
        <span class="m-green">R</span><span class="m-blue">I</span><span class="m-red">T</span><span class="m-yellow">M</span><span class="m-green">O</span>
    </h1>
    
    <div id="login-section">
        <form id="student-form">
            <input type="text" id="student-name" placeholder="Tu nombre..." required style="font-size: 1.5rem; padding: 15px; border-radius: 50px; border: 3px solid #000; text-align: center; margin-bottom: 20px; width: 300px;">
            <br>
            <button type="submit" class="btn-main btn-play">¡A Jugar! 🎮</button>
        </form>
    </div>

    <div id="game-content">
        <div class="instructions-panel">
            <div class="instruction-cards">
                <div class="card"><div class="note-visual">♩</div><h4>Negra</h4><p>Aplauso 👏</p></div>
                <div class="card"><div class="note-visual">𝄽</div><h4>Silencio</h4><p>¡Stop! ✋</p></div>
                <div class="card"><div class="note-visual">♫</div><h4>Doble</h4><p>Rápido 👏-👏</p></div>
                <div class="card"><div class="note-visual cuartina-img">♬♬</div><h4>Cuartina</h4><p>Piernas 🦵</p></div>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="diff-btn btn-l1" onclick="startGame(1)">🍄 Nivel 1</button>
            <button class="diff-btn btn-l2" onclick="startGame(2)">⭐ Nivel 2</button>
            <button class="diff-btn btn-l3" onclick="startGame(3)">🔥 Nivel 3</button>
        </div>

        <div id="game-area" style="display:none; flex-direction: column; align-items: center;">
            <div id="score-container"></div>
            <button class="btn-main btn-refresh" onclick="renderNewExercise()">¡Nuevo Ritmo!</button>
        </div>
    </div>

    <div class="credito-profesor">Creado por Profesor Matías Poblete</div>
</div>

<script>
    document.getElementById('student-form').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('game-content').style.display = 'block';
    });

    const { Renderer, Stave, StaveNote, Formatter, Beam } = Vex.Flow;
    let currentDifficulty = 1;

    function startGame(level) {
        currentDifficulty = level;
        document.getElementById('game-area').style.display = 'flex';
        document.querySelectorAll('.diff-btn').forEach((btn, i) => btn.classList.toggle('active', (i + 1) === level));
        renderNewExercise();
    }

    function generateMeasureData() {
        let beatsLeft = 4;
        let notes = [];
        // Lógica de progresión y moderación de cuartinas
        let sixteenthLimit = (currentDifficulty === 1) ? 1 : (currentDifficulty === 2 ? 2 : 3);
        let sixteenthCount = 0;

        while (beatsLeft > 0) {
            let choice;
            let rand = Math.random();
            
            if (currentDifficulty === 1) {
                if (rand < 0.20 && sixteenthCount < sixteenthLimit) choice = '16';
                else if (rand < 0.35) choice = 'qr';
                else choice = 'q';
            } 
            else if (currentDifficulty === 2) {
                if (rand < 0.30 && sixteenthCount < sixteenthLimit) choice = '16';
                else if (rand < 0.50) choice = '8';
                else if (rand < 0.60 && beatsLeft >= 2) choice = 'h';
                else if (rand < 0.85) choice = 'q';
                else choice = 'qr';
            } 
            else {
                if (rand < 0.45 && sixteenthCount < sixteenthLimit) choice = '16';
                else if (rand < 0.75) choice = '8';
                else if (rand < 0.85 && beatsLeft >= 2) choice = 'h';
                else choice = 'q';
            }

            if (choice === 'h' && beatsLeft >= 2) {
                notes.push({ keys: ["b/4"], duration: "h" });
                beatsLeft -= 2;
            } else if (choice === '16') {
                for(let i=0; i<4; i++) notes.push({ keys: ["b/4"], duration: "16" });
                sixteenthCount++;
                beatsLeft -= 1;
            } else if (choice === '8') {
                notes.push({ keys: ["b/4"], duration: "8" });
                notes.push({ keys: ["b/4"], duration: "8" });
                beatsLeft -= 1;
            } else {
                if (choice === 'qr') notes.push({ keys: ["b/4"], duration: "qr" });
                else notes.push({ keys: ["b/4"], duration: "q" });
                beatsLeft -= 1;
            }
        }
        return notes;
    }

    function renderNewExercise() {
        let numMeasures = currentDifficulty === 1 ? 2 : (currentDifficulty === 2 ? 3 : 4);
        let measures = [];
        for (let i = 0; i < numMeasures; i++) measures.push(generateMeasureData());
        drawScore(measures);
    }

    function drawScore(measuresData) {
        const container = document.getElementById("score-container");
        container.innerHTML = ""; 
        const renderer = new Renderer(container, Renderer.Backends.SVG);
        const mWidth = 240;
        renderer.resize((measuresData.length * mWidth) + 60, 160); 
        const context = renderer.getContext();
        let x = 10;

        measuresData.forEach((mNotes, i) => {
            const stave = new Stave(x, 20, mWidth);
            // Solo línea central
            stave.getConfigForLines().forEach((l, idx) => l.visible = (idx === 2));
            
            if (i === 0) stave.addTimeSignature("4/4");
            if (i === measuresData.length - 1) stave.setEndBarType(Vex.Flow.Barline.type.END);
            
            stave.setContext(context).draw();

            // stem_direction: 1 asegura que las plicas vayan siempre hacia ARRIBA
            const vfNotes = mNotes.map(n => new StaveNote({ 
                keys: n.keys, 
                duration: n.duration, 
                stem_direction: 1 
            }));
            
            const beams = Beam.generateBeams(vfNotes);
            Formatter.FormatAndDraw(context, stave, vfNotes);
            beams.forEach(b => b.setContext(context).draw());
            
            x += mWidth;
        });
    }
</script>
</body>
</html>
